<p>酒吧的女孩，后山的猎人是她的爷爷，似乎祖孙两个有些微小的摩擦。</p>
<ul>
    <li><strong>爱情事件</strong><br>
        伊芙的爷爷被困在了山洞里，用锤子砸开石头救他出来</li>
    <li><strong>活动地点</strong><br>
        星期一至星期日白天在广场或温泉附近，<br>
        除星期日以外的晚上在酒吧，<br>
        星期日晚上在温泉，雨雪天在酒吧。</li>
    <li><strong>喜好</strong><br>
        鲜花、蛋糕、番茄、玉米、鸡蛋、牛奶</li>
    <li><strong>香水喜好状况</strong><br>
        喜欢玫瑰香水，其次紫罗兰香水，讨厌紫丁香香水</li>
    <li><strong>星夜祭位置</strong><br>
        酒吧</li>
</ul>
