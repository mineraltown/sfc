<p>镇长的千金，教堂的修女，喜欢安静的环境。</p>
<ul>
    <li><strong>爱情事件</strong><br>
        早晨出门遇到镇长，得知玛丽亚离家出走了，在后山木匠家可以找到。</li>
    <li><strong>活动地点</strong><br>
        星期一至星期五在教堂外，<br>
        星期六、星期日在教堂里，<br>
        雨雪天在镇长家二楼。</li>
    <li><strong>喜好</strong><br>
        南国之实、芜菁、蘑菇、鸡蛋、牛奶、玉米、土豆、番茄</li>
    <li><strong>香水喜好状况</strong><br>
        喜欢紫丁香香水，其次紫罗兰香水，讨厌玫瑰香水</li>
    <li><strong>星夜祭位置</strong><br>
        教堂</li>
</ul>
