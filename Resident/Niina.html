<p>杂货店的女孩，对花和可爱的东西完全没有抵抗力。</p>
<ul>
    <li><strong>爱情事件</strong><br>
        妮娜失踪了，在后山的山洞最深处可以找到她，砸开石头救她出来。并采一棵药草给她吧。</li>
    <li><strong>活动地点</strong><br>
        星期一至星期五在杂货店门前，<br>
        星期六、星期日在后山，<br>
        雨雪天在杂货店里屋。</li>
    <li><strong>喜好</strong><br>
        鲜花、蛋糕、南国之实、蘑菇、鱼、土豆、玉米、鸡蛋、牛奶</li>
    <li><strong>香水喜好状况</strong><br>
        喜欢所有的香水</li>
    <li><strong>星夜祭位置</strong><br>
        后山山顶</li>
</ul>
